<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 50%, #FFC837 100%); }
        .card {
            text-align: center;
            color: white;
            font-family: -apple-system, sans-serif;
            padding: 60px;
        }
        .emoji { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 48px; margin: 0 0 16px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        p { font-size: 24px; opacity: 0.95; margin: 0; }
        .tags { margin-top: 24px; font-size: 18px; opacity: 0.85; }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🍼🔥💰</div>
        <h1>육아용품 최저가 알림</h1>
        <p>역대 최저가 · 특가 할인 · 실시간 알림</p>
        <div class="tags">기저귀 | 물티슈 | 분유 | 유아용품</div>
    </div>
</body>
</html>
